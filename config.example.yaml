# Newsroom configuration example
# Copy to config.yaml and adjust to your needs.

# ── Domain ─────────────────────────────────────────────────
# Defines which source directories and rewriter data to use.
# Available: wowcasual (gaming blog), technocrats (techno-futurology)
# Can be overridden via CLI: python -m newsroom -d wowcasual ...
domain: wowcasual

# ── Source directories ───────────────────────────────────────
# Each directory is scanned for *.yaml / *.yml files.
# Every file should contain a single source (type at top level)
# or multiple sources under a `sources:` key.
#
# If 'domain' is set and source_dirs is omitted, directories are
# auto-populated from the domain defaults:
#   wowcasual:   sources/wowcasual/{diablo_iv,eve_online,wow,...}_sources
#   technocrats: sources/technocrats/{technology,videogames}_sources
#
# Uncomment to override:
# source_dirs:
#   - sources/wowcasual/wow_sources
#   - sources/wowcasual/general_gaming_sources
  # - sources/obsidian_sources
  # - sources/gdrive_sources

# ── Inline sources (optional, merged after source_dirs) ──────
# You can still define sources directly here.  They are appended
# after those loaded from source_dirs.
sources: []
  # Example inline source:
  # - type: newsapi
  #   name: newsapi
  #   api_key: YOUR_API_KEY_HERE
  #   page_size: 20
  #   language: en
  #   sort_by: publishedAt

  # Web scraping (requires per-site CSS selectors)
  # - type: web
  #   name: custom-scraper
  #   sites:
  #     - url: https://example.com/news
  #       selectors:
  #         article: "article"        # container for each article
  #         title: "h2 a"             # title element (text + href)
  #         content: "p"              # content/summary element
  #         date: "time"              # date element (datetime attr or text)

  # Obsidian vault (reads .md notes as articles)
  # - type: obsidian
  #   name: my-vault
  #   vault_path: "C:/Users/me/MyVault"
  #   folders: ["Articles", "Blog/Published"]
  #   filter:
  #     tags: [technology]
  #     frontmatter:
  #       status: published
  #     modified_after: "2025-01-01"
  #   recursive: true

  # Google Drive (reads documents from a folder)
  # - type: gdrive
  #   name: research-docs
  #   credentials_path: "credentials.json"
  #   token_path: "token.json"
  #   folders: ["YOUR_FOLDER_ID"]
  #   file_types: [gdoc, md, txt]
  #   max_files: 50

# ── Processors ───────────────────────────────────────────────
processors:
  filter:
    enabled: true
    # Extra keywords beyond the topic (optional):
    # keywords:
    #   - machine learning
    #   - deep learning

  dedup:
    enabled: true
    similarity_threshold: 0.8   # 0-1, higher = stricter matching

  llm:
    enabled: false              # Set to true to enable LLM summaries

  rewriter:
    enabled: false              # Set to true to enable style rewriting

# ── LLM settings (only used when processors.llm.enabled = true) ──
llm:
  provider: openai              # "openai" or "anthropic"
  model: gpt-4o-mini            # Model name
  api_key: null                 # Set your API key here or via environment

# ── Rewriter (стилизация статей) ─────────────────────────────
# Переписывает собранные новости в стиле вашего блога.
# Перед использованием нужно:
#   1. Импортировать корпус: python -m newsroom rewriter-setup -d DOMAIN import export.xml
#   2. Запустить анализ стиля: python -m newsroom rewriter-setup -d DOMAIN analyze
#   Опции анализа: --use-batch (Batch API, -50% стоимость), --resume, --cost-estimate
#
# Если 'domain' задан, data_dir и corpus_path заполняются автоматически:
#   data_dir:    rewriter_data/{domain}
#   corpus_path: rewriter_data/{domain}/corpus.db
rewriter:
  # data_dir: rewriter_data/wowcasual       # авто из domain
  # corpus_path: rewriter_data/wowcasual/corpus.db
  intensity: medium                         # light / medium / full
  num_examples: 3                           # кол-во few-shot примеров
  max_article_length: 4000                  # макс. длина статьи (символов)
  llm:
    api_key: null                           # Anthropic API key (или через переменную окружения)
    model: claude-sonnet-4-20250514         # модель для перезаписи
    max_tokens: 4096

# ── Exporters (optional output destinations) ─────────────────
# Exporters run after formatting, writing results to external systems.
exporters: []
  # Obsidian vault exporter:
  # - type: obsidian
  #   vault_path: "/path/to/vault"
  #   output_folder: "Newsroom/Digests"
  #   mode: single_file          # single_file | per_article
  #   date_in_filename: true
  #   frontmatter:
  #     extra_tags: [newsroom, auto-generated]
  #     properties:
  #       source: newsroom

  # Google Drive exporter:
  # - type: gdrive
  #   credentials_path: "credentials.json"
  #   token_path: "token.json"
  #   folder_id: "YOUR_FOLDER_ID"
  #   upload_as: file             # file | gdoc
  #   file_format: markdown       # markdown | html | plaintext | json
  #   filename_template: "{topic}_{date}"

# ── Output ───────────────────────────────────────────────────
output:
  format: markdown              # markdown | json | html | plaintext
  path: null                    # File path, or null for stdout
