# Формат: Обзор игры
# Структурированный разбор игры, дополнения или состояния проекта
id: review
name: Обзор игры
description: >
  Структурированный разбор игры, DLC, ремастера или состояния проекта после патча.
  Личный опыт как фундамент, постоянные сравнения с другими играми,
  честная критика рядом с восторгом. Может быть многосерийным.
  Тон «опытный геймер делится впечатлениями за пивом».

subtypes:
  full_review: >
    Полный обзор игры после прохождения или значительного наигрыша.
    Покрывает все аспекты: геймплей, сюжет, визуал, техническое состояние.
    Пример: Black Myth Wukong, Horizon Zero Dawn, AC Origins.
  dlc_review: >
    Обзор дополнения. Сравнение с базовой игрой и другими DLC обязательно.
    Фокус на том, что нового, стоит ли денег. Короче полного обзора.
    Пример: AC Valhalla «Осада Парижа», «Гнев друидов».
  preliminary: >
    Предварительный обзор — автор ещё не прошёл, но опыта хватает для впечатлений.
    Явно обозначается как предварительный. Обещание финального обзора.
    Пример: Elden Ring (50+ часов, треть карты).
  revisit: >
    Обзор состояния игры спустя время после релиза (после патчей, фиксов).
    Фокус: стоит ли играть сейчас? Что изменилось?
    Пример: Cyberpunk 2077 после патча 1.22.
  beta_impressions: >
    Впечатления от бета-теста или раннего доступа. Технические проблемы ожидаемы,
    фокус на потенциале и фундаменте. Короткий формат.
    Пример: Diablo II Resurrected бета.
  analytical: >
    Аналитическое эссе с обзорным ядром. Не столько «разбор по пунктам»,
    сколько размышление о том, что делает игру хорошей/плохой.
    Может ставить под вопрос общепринятое мнение.
    Пример: Ghost of Tsushima (баланс компонентов), RDR2 (так ли идеальна?).
  multipart: >
    Многосерийный обзор — слишком масштабная игра для одного материала.
    Части могут быть для разных аудиторий (общая + для фанатов серии).
    Пример: AC Valhalla часть 1 (для всех) + часть 2 (для фанатов серии).
  mmo_expansion: >
    Обзор расширения/сезона MMO. Контекст: история изменений проекта,
    что пробовали раньше, что работает сейчас. Элемент ностальгии.
    Пример: WoW Dragonflight.

constraints:
  word_count:
    min: 600
    max: 4000
    target: 1800
    note: >
      Full_review и analytical — 1500-4000 слов.
      DLC_review — 800-1500. Beta_impressions — 600-1200.
      Multipart — каждая часть 1500-3000.
  paragraphs:
    max_length: 3-6 предложений
    note: >
      Допустимы более длинные абзацы в аналитических пассажах
      и при развёрнутых сравнениях.
  subheadings: required
  heading_depth: до H3, для multipart допустим H4

structure:
  intro: >
    Личный контекст: как автор пришёл к этой игре, что ожидал, сколько наиграл.
    Часто через историю знакомства с жанром или серией.
    Для revisit/beta — почему решил вернуться/попробовать.
    Указание платформы и наигрыша в часах.
  body:
    common:
      - Сравнения с другими играми — сквозной приём, 3-5 референсов на обзор
      - Прямые цитаты из собственных реакций («я понял, что...», «после этого...»)
      - Баланс плюсов и минусов — честная критика даже любимых игр
      - Конкретика: числа (часы, fps, стоимость), названия механик, примеры ситуаций
    full_review:
      - Геймплей и боевая система (с примерами конкретных боёв/механик)
      - Сюжет и персонажи (без спойлеров ключевых поворотов)
      - Визуал и техническое состояние (баги, fps, платформа)
      - Система развития персонажа / прогрессия
      - Открытый мир / дизайн уровней
      - Проблемы и недостатки (отдельный блок или вплетены в разделы)
    dlc_review:
      - Что нового по механикам
      - Сравнение с базовой игрой и другими DLC
      - Объём контента (часы, количество квестов/локаций)
      - Стоит ли покупать (и за сколько — полная цена / со скидкой)
    preliminary:
      - Что успел увидеть, что ещё впереди
      - Первые впечатления по каждому аспекту
      - Явная оговорка о предварительности
    revisit:
      - Что изменилось с релиза / прошлого патча
      - Какие проблемы остались
      - Стоит ли играть сейчас
    analytical:
      - Тезис / вопрос в заголовке или вступлении
      - Разбор на компоненты с примерами из разных игр
      - Аргументация: почему X работает, а Y нет
    mmo_expansion:
      - История изменений механик через прошлые аддоны
      - Что нового в текущем расширении
      - Контекст разработки (кто ушёл, кто пришёл, что обещали)
  outro: >
    Вердикт: «сухой остаток». Часто структурирован как плюсы/минусы списком.
    Кому подойдёт, кому нет. Для revisit — стоит ли сейчас.
    Для preliminary — обещание финального обзора.
    Может содержать надежду на DLC/патчи/сиквел.

tone:
  primary: критически-восхищённый
  allowed:
    - энтузиазм при описании удачных решений
    - разочарование и конструктивная критика при описании провалов
    - сравнительный анализ как основной аргументационный приём
    - юмор и ирония (особенно при описании багов и абсурдных ситуаций)
    - ностальгия при обзорах ремастеров и MMO-расширений
    - лёгкая провокация («так ли идеальна?», «стоит ли играть?»)
    - самоирония («я потратил 150 часов и не жалею»)
  avoid:
    - безосновательный хейт
    - фанбойство без критики
    - пересказ маркетинговых материалов
    - оценки числами (7/10) — вместо этого словесный вердикт
    - сухой академический тон (это блог, не IGN)

formatting:
  bold: названия игр, ключевые механики, важные числа, вердикт
  italic: названия локаций, персонажей, DLC
  lists: для плюсов/минусов, характеристик, сравнений
  quotes: прямая речь автора как стилистический приём (выделяется кавычками)

examples:
  # === full_review ===
  - url: https://www.wowcasual.info/black-myth-wukong-obzor-igry/
    title: "Black Myth: Wukong. Обзор игры"
    subtype: full_review
    note: >
      Классический полный обзор. Мир/сюжет → боссы/боевка → экипировка →
      техническое состояние → вердикт. Сравнения с Wo Long, God of War, Sekiro,
      Elden Ring. Критика (нет карты, слабый нарратив) рядом с восторгом (боссы).

  - url: https://www.wowcasual.info/wo-long-fallen-dynasty-soulzlajk-epohi-troeczarstviya/
    title: "Wo Long: Fallen Dynasty. Соулзлайк эпохи Троецарствия"
    subtype: full_review
    note: >
      Обзор соулзлайка. Фокус на боевой системе и боссах — сердце жанра.
      Сравнение с Sekiro, Elden Ring, Diablo по лутовой системе.
      Неровное качество боссов как центральная претензия.

  - url: https://www.wowcasual.info/hogwarts-legacy-standartnaya-igra-v-kultovom-sett/
    title: "Hogwarts Legacy. Стандартная Action/RPG в культовом сеттинге"
    subtype: full_review
    note: >
      Обзор с тезисом в заголовке — «стандартная, но в культовом сеттинге».
      Честная оценка: увлекательна, но без глубины. Проблема переиграбельности
      как ключевой минус. Сравнение с WoW Dragonflight (полёты на мётлах).

  - url: https://www.wowcasual.info/horizon-zero-dawn-obzor-igry/
    title: "Horizon Zero Dawn. Обзор игры"
    subtype: full_review
    note: >
      Обзор порта с PS4. Технические проблемы портирования как отдельный блок.
      Сильные стороны (сеттинг, боевка, Элой) vs слабые (прогрессия, лут, побочки).
      Конкретные оценки отдельных аспектов (атмосфера 10/10, сюжет 8/10).

  - url: https://www.wowcasual.info/assassins-creed-origins-retro-reczenziya/
    title: "Assassin's Creed: Origins. Ретро-рецензия"
    subtype: full_review
    note: >
      Ретро-рецензия — обзор старой игры. Исторический контекст сеттинга
      как вступление. Сравнение с Odyssey по тону и атмосфере.
      Критика гринда ресурсов и «современной» линии.

  - url: https://www.wowcasual.info/immortals-fenyx-rising/
    title: "Immortals Fenyx Rising. Обзор игры"
    subtype: full_review
    note: >
      Обзор «неожиданной находки» — автор не планировал играть. Три компонента
      (боевка, пазлы, платформинг) как каркас. Мультяшный стиль как плюс.
      Короткий и позитивный обзор без тяжёлой критики.

  # === dlc_review ===
  - url: https://www.wowcasual.info/assassins-creed-valhalla-obzor-dlc-osada-parizha/
    title: "Assassin's Creed Valhalla. Обзор DLC «Осада Парижа»"
    subtype: dlc_review
    note: >
      Негативный обзор DLC. Прямое сравнение с «Гневом друидов» по всем параметрам
      (локации, враги, награды, боссы). Исторический контекст осады.
      Вердикт: «пятое колесо», не покупать без скидок.

  - url: https://www.wowcasual.info/acv-wrath-of-druids/
    title: "Assassin's Creed Valhalla. Обзор DLC Wrath of the Druids"
    subtype: dlc_review
    note: >
      Умеренно-позитивный обзор DLC. Новые механики (торговые посты, поручения)
      описаны подробно. Разделение рекомендаций: для новичков vs для ветеранов.
      Каталог сетов доспехов как справочный блок.

  # === preliminary ===
  - url: https://www.wowcasual.info/elden-ring-predvaritelnyj-obzor/
    title: "Elden Ring. Предварительный обзор"
    subtype: preliminary
    note: >
      Эталон предварительного обзора. 50+ часов, треть карты, один сюжетный босс.
      Длинные развёрнутые пассажи (не краткий формат). Визуал и мир хвалит,
      боссов и сюжет критикует. Постоянные сравнения с Sekiro, AC, RDR2, Cyberpunk.
      Обещание финального обзора в конце.

  # === revisit ===
  - url: https://www.wowcasual.info/c2077/
    title: "Cyberpunk 2077 после патча 1.22 — стоит ли играть?"
    subtype: revisit
    note: >
      Revisit-обзор: стоит ли играть спустя 5 месяцев. Конфигурация ПК и fps.
      Сеттинг и Night City как сильные стороны. Баги, квестовые проблемы,
      слабая RPG-система как оставшиеся минусы. План вернуться после DLC.

  # === beta_impressions ===
  - url: https://www.wowcasual.info/diablo-ii-ressurected/
    title: "Diablo II Resurrected: впечатления от бета-теста"
    subtype: beta_impressions
    note: >
      Короткий формат. Баги беты → критика унаследованных механик (инвентарь) →
      синематики и визуал как плюсы → анализ причин успеха оригинала →
      прогноз на успех ремастера. Ностальгический тон.

  # === analytical ===
  - url: https://www.wowcasual.info/ghost-of-tsushima-idealnaya-kombinacziya/
    title: "Ghost of Tsushima. Идеальная комбинация"
    subtype: analytical
    note: >
      Не обзор, а аналитическое эссе. Семь параметров оценки игр → примеры
      из других игр (Cyberpunk, No Man's Sky, AC Valhalla, HFW, DS3) →
      Ghost of Tsushima как эталон баланса. Тезис в заголовке.

  - url: https://www.wowcasual.info/tak-li-idealna-red-dead-redemption-2/
    title: "Так ли идеальна Red Dead Redemption 2?"
    subtype: analytical
    note: >
      Провокационный тезис: критика «священной коровы». Достоинства (персонажи,
      мир, детализация) → критика (медленное перемещение, посредственная боевка,
      растянутый сюжет, бесполезная система чести). Вопрос в заголовке.

  # === multipart ===
  - url: https://www.wowcasual.info/assassins-creed-valhalla-obzor-igry-chast-1/
    title: "Assassin's Creed Valhalla. Обзор игры, часть 1"
    subtype: multipart
    note: >
      Часть 1 для широкой аудитории. Сюжет → историческая достоверность →
      развитие персонажа → доспехи → боевка → техническое состояние →
      плюсы/минусы списком. 150 часов наигрыша. Самый масштабный обзор.

  - url: https://www.wowcasual.info/assassins-creed-valhalla-obzor-igry-chast-2/
    title: "Assassin's Creed Valhalla. Обзор игры, часть 2"
    subtype: multipart
    note: >
      Часть 2 для фанатов серии. Фокус на отличиях от Origins и Odyssey
      по каждому аспекту: лут, боевка, сюжетная структура, побочки, стелс,
      RPG-компонента. «Это не рескин» — аргументированная защита.

  # === mmo_expansion ===
  - url: https://www.wowcasual.info/wolrd-of-warcraft-dragonflight-ozhidaniya-opravdalis/
    title: "World of Warcraft: Dragonflight. Ожидания оправдались"
    subtype: mmo_expansion
    note: >
      История эволюции WoW через призму системы прогрессии (ваниль → Legion →
      Dragonflight). Критика Renown и гейтования контента. Скептицизм
      по поводу возвращения Метцена. Оценка «три с плюсом».
