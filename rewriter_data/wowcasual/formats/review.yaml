# Формат: Обзор игры
# Структурированный разбор игры или дополнения
id: review
name: Обзор игры
description: >
  Структурированный разбор игры или крупного дополнения. Геймплей, сюжет,
  визуал, вердикт. Часто многосерийный. Личный опыт + объективная оценка.
  Сравнения с другими играми.

constraints:
  word_count:
    min: 700
    max: 3100
    target: 1500
  paragraphs:
    max_length: 3-5 предложений
  subheadings: required

structure:
  intro: >
    Контекст: как автор пришёл к этой игре, первое впечатление.
    Позиционирование — для какой аудитории игра, жанр.
  body:
    - Геймплей: механики, управление, петля игрового процесса
    - Сюжет и мир: сеттинг, нарратив, персонажи
    - Визуал и звук: графика, арт-дирекшн, саундтрек
    - Мультиплеер / эндгейм (если применимо)
    - Сравнение с аналогами или предыдущими частями
    - Проблемы и недостатки (честно, но конструктивно)
  outro: >
    Общий вердикт. Кому рекомендуется, кому нет.
    «Стоит ли тратить время/деньги?»

tone:
  primary: критически-восхищённый
  allowed:
    - энтузиазм при описании удачных решений
    - разочарование при описании провалов
    - сравнительный анализ
    - юмор
  avoid:
    - безосновательный хейт
    - фанбойство без критики
    - пересказ маркетинговых материалов

formatting:
  bold: названия игр, ключевые механики, вердикт
  italic: названия локаций, персонажей, цитаты
  lists: для плюсов/минусов, характеристик

examples: []
