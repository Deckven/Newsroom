# Формат: Лор / Хроника
# Повествование об игровой вселенной, сторителлинг + анализ
id: lore
name: Лор / Хроника
description: >
  Повествование об игровой вселенной — пересказ и анализ лора,
  хроники, книг, внутриигровых событий. Сторителлинг с аналитическим
  разбором. Доминирует серийный формат (части), но бывают и
  самостоятельные аналитические статьи. Охватывает RPG, MMO,
  action-adventure — любые игры с глубоким лором.

subtypes:
  serial_chronicle:
    description: >
      Многочастная серия, последовательно раскрывающая историю вселенной.
      Может быть хронологической (EVE Online — от истоков до современности),
      по локациям (Elden Ring — регион за регионом) или по эпохам
      (Assassin's Creed — от Ису до тамплиеров). Каждая часть самодостаточна,
      но связана с предыдущими.
    structure:
      intro: >
        Связка с предыдущей частью (если не первая). Контекст: о каком
        периоде/регионе/цивилизации пойдёт речь. Интрига — почему это
        важно для понимания вселенной.
      body:
        - Хронологическое или географическое повествование
        - Пересказ событий с авторскими комментариями и отступлениями
        - Анализ мотиваций персонажей и фракций
        - Параллели с мифологией, реальной историей, литературой
        - Спекуляции и фанатские теории (с пометкой «но это неточно»)
        - Отсылки к игровому опыту — описания предметов, реплики NPC
      outro: >
        Обобщение значимости описанных событий. Тизер следующей части
        («в следующем выпуске будет рассказано про...»).
        «Продолжение следует.»
  lore_essay:
    description: >
      Самостоятельная аналитическая статья, посвящённая конкретному
      аспекту лора: персонажу, концепту, фракции, сюжетной арке.
      Не привязана к серии, хотя может ссылаться на другие материалы.
      Больше авторской позиции и аргументации, чем в хронике.
    structure:
      intro: >
        Постановка вопроса или тезиса. Почему эта тема заслуживает
        отдельного разбора. Личный контекст автора.
      body:
        - Анализ с опорой на игровые источники (предметы, диалоги, катсцены)
        - Авторские теории и их обоснование
        - Мифологические и культурные параллели
        - Полемика с другими интерпретациями
        - Контекст разработки (датамайнинг, интервью)
      outro: >
        Вывод или открытый вопрос. Признание неполноты информации
        («мы пока не знаем наверняка»).
  book_chronicle:
    description: >
      Пересказ или перевод официальных книг, хроник, комиксов по
      вселенной игры. Эпический повествовательный стиль, близкий
      к оригиналу. Минимум авторских комментариев, максимум
      верности первоисточнику.
    structure:
      intro: >
        Контекст: какой том/глава, какой период истории покрывает.
        Связка с предыдущей частью.
      body:
        - Последовательный пересказ событий книги
        - Ключевые диалоги и сцены
        - Описания масштабных битв и политических интриг
        - Судьбы персонажей
      outro: >
        Итог описанного периода. Что изменилось в расстановке сил.
        Ссылка на следующую часть.

constraints:
  word_count:
    min: 1500
    max: 5000
    target: 2500
    note: >
      book_chronicle может достигать 9000+ слов (пересказ целых глав).
      serial_chronicle обычно 1800–3500. lore_essay обычно 1600–2000.
  paragraphs:
    max_length: 5-7 предложений
    note: в лорных статьях абзацы длиннее, чем в гайдах/обзорах
  subheadings: required
  series_navigation: >
    Для serial_chronicle и book_chronicle — ссылки на другие части серии
    в начале или конце статьи.

structure:
  intro: >
    Контекстуализация: о каком периоде/событии/персонаже пойдёт речь.
    Связка с предыдущей частью (если серия). Интрига — почему это важно
    для понимания вселенной. Личный контекст автора — как пришёл к теме.
  body:
    - Хронологическое или тематическое повествование
    - Пересказ событий с авторскими комментариями
    - Анализ мотиваций персонажей
    - Параллели между игровым лором и реальной историей/мифологией
    - Отсылки к внутриигровому опыту
    - Спекуляции и теории с оговорками
    - Разговорные отступления («впрочем, вернемся к...», «но это неточно»)
  outro: >
    Обобщение значимости описанных событий. Тизер следующей части
    (если серия). Философское наблюдение или открытый вопрос.

tone:
  primary: повествовательно-аналитический
  allowed:
    - эпичность и восхищение масштабом
    - критический разбор сюжетных дыр
    - ностальгия
    - спекулятивность (теории и предположения)
    - ирония и самоирония
    - разговорные отступления от темы
    - восхищение замыслом разработчиков
  avoid:
    - сухой пересказ без авторской позиции
    - фанатичное восхваление без критики
    - академическая сухость (даже в book_chronicle)

formatting:
  bold: имена ключевых персонажей, названия событий, эпох и фракций
  italic: цитаты из игр, книг, хроник; внутриигровые термины
  lists: для хронологий, перечисления фракций/персонажей, структур власти
  subheadings: тематические, не нумерованные (названия разделов как мини-заголовки)
  images: скриншоты из игр для визуальной поддержки повествования

