# Формат: Аналитика / Эссе
# Философские размышления о гейминге, сообществе, индустрии
id: essay
name: Аналитика / Эссе
description: >
  Авторские размышления о гейминге, игровом сообществе, индустрии.
  Самый «авторский» формат — максимум личного мнения, иронии,
  ностальгии, метафор. Может быть привязан к инфоповоду (релиз,
  Blizzcon) или быть вневременным размышлением. Короткий формат —
  многие статьи укладываются в 600–1400 слов.

subtypes:
  polemic:
    description: >
      Спорный тезис + аргументация. Автор занимает позицию в дискуссии
      и защищает её примерами. Часто — ответ на критику или сравнение
      двух подходов/игр. Обязательно рассматривает контраргументы.
    structure:
      intro: >
        Постановка спорного вопроса. Контекст дискуссии.
      body:
        - Тезис автора
        - Аргументация с примерами из игрового опыта
        - Контраргументы и их разбор
        - Сравнения с другими играми как доказательства
      outro: >
        Вывод (не обязательно однозначный). Приглашение к дискуссии.
  reflection:
    description: >
      Глубокие философские размышления, параллели между играми
      и жизнью/культурой. Личный нарратив — автор осмысляет свой
      игровой опыт через призму чего-то большего (психология,
      боевые искусства, культурные тренды).
    structure:
      intro: >
        Личный контекст — как автор пришёл к теме. Обещание
        необычного угла зрения.
      body:
        - Личный опыт как отправная точка
        - Параллели с неигровой реальностью
        - Философские наблюдения
        - Эмоциональная честность
      outro: >
        Философское обобщение. Открытый вопрос или инсайт.
  manifesto:
    description: >
      Личная позиция «почему я (не) буду играть». Автор объясняет
      своё решение — отказ от игры, переход на другую версию,
      реакция на маркетинговый ход. Эмоциональный, от первого лица.
    structure:
      intro: >
        Заявление позиции. Контекст отношений автора с игрой/франшизой.
      body:
        - Причины решения (конкретные, с примерами)
        - История взаимоотношений с игрой/компанией
        - Сравнения с тем, как было раньше
        - Личные ощущения и разочарования
      outro: >
        Финальный вердикт. Иногда — надежда на будущее.
  industry_critique:
    description: >
      Критика компании, тренда или события в индустрии. Привязан
      к инфоповоду (Blizzcon, провальный релиз). Анализ системных
      проблем, а не просто жалоба.
    structure:
      intro: >
        Инфоповод. Позиция автора как лояльного фаната.
      body:
        - Описание события/проблемы
        - Исторический контекст (как компания дошла до этого)
        - Анализ причин (уход людей, смена приоритетов)
        - Сравнения с тем, как было раньше
      outro: >
        Прогноз или призыв. Метафора.
  personal_note:
    description: >
      Дневниковые заметки, вишлисты, личные истории. Самый
      неформальный подтип. Нет жёсткой структуры — автор
      просто делится тем, что на уме.
    structure:
      intro: >
        Контекст — что побудило написать.
      body:
        - Свободное повествование
        - Личные детали (покупки, апгрейды, планы)
        - Перечисления с комментариями
      outro: >
        Неформальное завершение. «Ну а пока — пока.»

constraints:
  word_count:
    min: 600
    max: 2400
    target: 1200
    note: >
      Многие эссе короткие (600–900 слов). polemic и reflection
      обычно длиннее (1300–2200). personal_note самый короткий.
  paragraphs:
    max_length: 3-5 предложений
  subheadings: optional
  note: >
    Подзаголовки чаще есть в polemic и comparison, реже в
    manifesto и personal_note.

structure:
  intro: >
    Провокационный тезис, вопрос или наблюдение.
    Личный контекст — как автор пришёл к теме.
  body:
    - Формулировка проблемы / темы
    - Аргументация с примерами из игрового опыта
    - Контраргументы (честный разбор обеих сторон)
    - Исторический контекст и эволюция явления
    - Личные истории как иллюстрации
    - Сравнения с другими играми (3-5 референсов)
    - Разговорный язык и сленг как норма
  outro: >
    Авторский вывод (не обязательно однозначный).
    Приглашение к дискуссии. Философское обобщение.

tone:
  primary: рефлексивно-ироничный
  allowed:
    - ностальгия
    - провокативность
    - самоирония
    - лёгкий пафос с самоосознанием
    - разговорный сленг («полыхало», «жмякаешь на кнопку»)
    - сарказм
    - эмоциональная честность
    - риторические вопросы
  avoid:
    - морализаторство
    - безапелляционность
    - сухая академичность
    - формальный тон

formatting:
  bold: ключевые тезисы, важные выводы
  italic: цитаты, внутренний диалог, эмоциональные акценты
  lists: редко, только для структурирования аргументов (polemic, personal_note)

