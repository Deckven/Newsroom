# Формат: Гайд
# Руководство по игровым механикам, системам и контенту
id: guide
name: Гайд
description: >
  Руководство по игровым механикам, классам, профессиям, экипировке,
  контенту или навигации по серии/жанру. Может быть пошаговой инструкцией,
  справочным каталогом или стратегическим разбором. Структурированная подача
  от опытного игрока — тон «друг объясняет нубу».

subtypes:
  step_by_step: >
    Пошаговая прокачка/прогресс с разбивкой по этапам, ИЛИ разбор игровой системы
    по компонентам (от простого к сложному). Пример: прокачка профессии,
    закрытие червоточин, разбор боевой системы.
  catalog: >
    Справочный каталог предметов/сетов/билдов/методов с описанием каждого.
    Может быть обёрнут в нарратив личного опыта (не обязательно сухой справочник).
    Пример: наборы доспехов, обзор кораблей, способы заработка с доходностью.
  onboarding: >
    Комплексное введение в игру для новичков — от лора до практических советов.
    Работает для любых жанров (RPG, MMO, градостроители и т.д.).
    Пример: EVE Online для новичков, базовые принципы Cities: Skylines.
  hunt_strategy: >
    Разбор стратегии добычи конкретного предмета/маунта/достижения.
    Диапазон: от развёрнутого (с таймерами, аддонами, тактиками)
    до компактного (лор + условия + список шагов).
    Пример: охота на редкого моба, получение Эскалибура.
  decision: >
    Помощь в выборе: с какой игры начать серию, какой класс выбрать, какой билд собрать.
    Пример: с какой части AC начать, какую расу выбрать.

constraints:
  word_count:
    min: 600
    max: 5000
    target: 1500
    note: >
      Onboarding-гайды и каталоги могут быть 3000-5000 слов.
      Step-by-step и hunt_strategy обычно 800-2000.
      Decision-гайды — 1000-2500.
  paragraphs:
    max_length: 3-5 предложений
  subheadings: required
  heading_depth: до H3, для каталогов допустим H4

structure:
  intro: >
    Для кого этот гайд и зачем. Личный опыт как мотивация или контекст.
    «Когда я впервые...» / «Многие спрашивают...»
    Для onboarding — краткая завязка лора или история игры.
  body:
    common:
      - Подзаголовки обязательны для каждого смыслового блока
      - Списки (нумерованные для шагов, маркированные для вариантов)
      - Советы из личного опыта («лайфхаки»)
      - Предупреждения о типичных ошибках
    step_by_step:
      - Разбивка по уровням/этапам прогресса ИЛИ по компонентам системы
      - Конкретные числа, диапазоны, названия ресурсов/предметов
      - Указание локаций для каждого этапа
      - Для технических гайдов: конкретные билды/фиты/конфигурации
      - Сценарии «если X, то делай Y» для разных ситуаций
    catalog:
      - Единообразная структура для каждого элемента каталога
      - "Карточка" предмета: название, путь получения, ключевые характеристики
      - Группировка по категориям (путь/класс/тип/зона)
      - Допустимо: числовые показатели эффективности (ISK/час, DPS, стоимость)
      - Допустимо: личный нарратив как обёртка для справочных данных
    onboarding:
      - Лор и сеттинг как отправная точка (необязательно для не-RPG)
      - Ключевые системы игры (прокачка, экономика, PvP/PvE)
      - Структура «меню» — каждый раздел самодостаточен
      - Практические советы новичку в конце
      - Допустимо: вложенные разделы с глубокой детализацией
      - Допустимо: оценки DLC/контента с рекомендацией «брать/не брать»
      - Допустимо: блок сравнения с другой игрой как «мостик»
    hunt_strategy:
      - Описание цели охоты и её ценности (лор предмета как вступление)
      - Механика спавна/получения (таймеры, условия, шансы)
      - Подготовка: аддоны, макросы, экипировка
      - Тактики: варианты с разным уровнем вложений (времени/ресурсов)
      - Личный опыт автора как кейс
      - Масштаб гибкий: от развёрнутого разбора до компактного чеклиста
    decision:
      - Варианты выбора с плюсами и минусами каждого
      - Авторская рекомендация с обоснованием
      - «Если вам нравится X — выбирайте Y»
  outro: >
    Резюме ключевых моментов. Пожелание удачи или призыв
    делиться своими находками в комментариях.

tone:
  primary: дружелюбно-наставнический
  allowed:
    - юмор при описании ошибок
    - ностальгия («раньше было сложнее»)
    - самоирония
    - азарт и увлечённость (особенно в hunt_strategy)
    - лёгкая экспертная уверенность без менторства
    - оборачивание справочного контента в личный нарратив («не гайд, а рассказ»)
    - сравнение с другими играми как «мостик» для читателя
  avoid:
    - снисходительность к новичкам
    - перегрузка терминами без пояснений
    - сухой энциклопедический тон (это блог, не вики)

formatting:
  bold: ключевые термины, названия способностей/систем, важные числа, названия сетов/кораблей
  italic: названия предметов, NPC, локаций, названия игр в серии
  lists: обязательны для шагов, перечислений и характеристик
  nested_lists: допустимы в каталогах и onboarding-гайдах
  tables: допустимы для сравнений (плюсы/минусы, характеристики)

examples:
  - url: https://www.wowcasual.info/gajd-po-prokachke-travnichestva-1-450/
    title: "WoW Classic: гайд по прокачке травничества"
    subtype: step_by_step
    note: >
      Эталон пошагового гайда. Разбивка по уровневым диапазонам (1-50, 50-115, ...),
      для каждого этапа — локации и конкретные растения. Рекомендации по аддонам
      и сочетаниям профессий во вступлении.

  - url: https://www.wowcasual.info/assassins-creed-valhalla-gajd-po-naboram-dospehov/
    title: "Assassin's Creed Valhalla: гайд по наборам доспехов"
    subtype: catalog
    note: >
      Каталог сетов. Вводный блок о системе доспехов (три пути, способы получения,
      улучшение). Затем однородные «карточки» сетов: путь, уровень мощи, локации
      частей, бонусы. Группировка: мир → магазин.

  - url: https://www.wowcasual.info/eve-online-gajd-dlya-novichkov/
    title: "EVE Online: гайд для новичков"
    subtype: onboarding
    note: >
      Комплексный онбординг ~4000 слов. Лор → навыки → корабли → зоны безопасности
      → советы. Глубокая вложенность (H2→H3→H4). Объясняет сложные системы
      доступным языком, использует аналогии с другими играми.

  - url: https://www.wowcasual.info/seriya-assassins-creed-s-kakoj-igry-nachat/
    title: "Серия Assassin's Creed: с какой игры начать?"
    subtype: decision
    note: >
      Decision-гайд. Три варианта подхода (по дате выхода, хронология, лучшие игры)
      с плюсами-минусами каждого. Авторская рекомендация в конце. Лёгкий тон,
      без давления — «зависит от ваших предпочтений».

  - url: https://www.wowcasual.info/zateryanny-j-vo-vremeni-protodrakon-ka/
    title: "Затерянный во времени протодракон: как поймать?"
    subtype: hunt_strategy
    note: >
      Стратегический гайд по охоте на рарника. Механика спавна и таймеров,
      аддоны и макросы, три тактики охоты (кэмп, патруль, смешанный),
      анализ конкуренции на сервере. Личный кейс автора в конце.

  - url: https://www.wowcasual.info/eve-frontier-gajd-po-pervym-shagam-v-igre/
    title: "EVE Frontier: гайд по первым шагам в игре"
    subtype: onboarding
    note: >
      Онбординг в новую игру на этапе альфа-теста. Практический фокус:
      ресурсы → база → корабль → топливо → стратегия развития. Блок сравнения
      с EVE Online в конце — приём «мостик от знакомой игры». Конкретные числа
      и рецепты крафта.

  - url: https://www.wowcasual.info/eve-online-kak-hlopat-chervotochiny-v-vh-prostranstve/
    title: "EVE Online: как хлопать червоточины в ВХ-пространстве"
    subtype: step_by_step
    note: >
      Технический процедурный гайд. Классификация червоточин → механика массы →
      пошаговое закрытие (два сценария) → фиты кораблей. Точные числа масс,
      конкретные билды (Megathron, Praxis, Onyx). Кейс с багом после ДТ — живой опыт.

  - url: https://www.wowcasual.info/eve-online-pro-majning-v-hajseke-i-louseke/
    title: "EVE Online: про майнинг в хайсеке и лоусеке"
    subtype: catalog
    note: >
      Гибрид каталога и личного опыта. Автор прямо говорит «это не гайд, а рассказ».
      Корабли, типы руд, связки → разбивка по зонам (хайсек/лоусек) с доходностью
      в ISK/час. История потери флота на 16 млрд как предупреждение. Показывает,
      что формат каталога может быть обёрнут в нарратив.

  - url: https://www.wowcasual.info/assassins-creed-valhalla-gajd-dlya-novichkov/
    title: "Assassin's Creed Valhalla: гайд для новичков"
    subtype: onboarding
    note: >
      Всеобъемлющий онбординг: основные квесты → опциональные → прокачка →
      способности → экипировка → поселение → DLC → режимы. Структура «меню» —
      каждый раздел самодостаточен. Оценки DLC с рекомендацией «брать/не брать».

  - url: https://www.wowcasual.info/assassins-creed-valhalla-kak-poluchit-mech-eskalibur/
    title: "Assassin's Creed Valhalla: как получить меч Эскалибур"
    subtype: hunt_strategy
    note: >
      Короткий hunt-гайд. Лор предмета как вступление → условия получения →
      список источников табличек → финальная локация. Компактный формат,
      минимум воды — модель для коротких целевых гайдов.

  - url: https://www.wowcasual.info/assassins-creed-valhalla-gajd-po-boevoj-sisteme/
    title: "Assassin's Creed Valhalla: гайд по боевой системе"
    subtype: step_by_step
    note: >
      Разбор игровой системы по компонентам: атаки → параметры (HP/адреналин/
      выносливость) → прокачка → способности → экипировка → руны. Структура
      «от простого к сложному». Конкретные советы («первым делом разблокируйте
      полоски адреналина»).

  - url: https://www.wowcasual.info/cities-skylines-bazovye-princzipy-igry/
    title: "Cities: Skylines — базовые принципы игры"
    subtype: onboarding
    note: >
      Онбординг в не-RPG игру. Три столпа (планировка, инфраструктура, транспорт)
      как каркас. Конкретные пропорции (коммерция:жильё 1:6). Предупреждения
      о неочевидных механиках (Death Wave, канализация). Показывает, что формат
      работает за пределами RPG/MMO.
