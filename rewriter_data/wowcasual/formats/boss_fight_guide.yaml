# Формат: Гайд по боссфайтам
# Тактика рейдовых боссов и энкаунтеров
id: boss_fight_guide
name: Гайд по боссфайтам
description: >
  Практическое руководство по прохождению рейдовых боссов.
  Справочный стиль с элементами лора — описание способностей,
  тактика по сложностям (нормал/героик/мифик), таблица лута.
  Серийный формат — по одному боссу на статью, объединённые
  в серию по рейду. Также бывают обзоры рейда целиком.

subtypes:
  boss_tactics:
    description: >
      Тактика на конкретного босса. Один босс — одна статья.
      Стандартная структура: лор → способности → тактика по
      сложностям → видео → лут. Часть серии по рейду.
    structure:
      intro: >
        Краткая история персонажа-босса (лор). Контекст энкаунтера.
      body:
        - Обзор боя (общая механика, фазы)
        - Описание способностей босса (с названиями, уроном)
        - Тактика для нормального режима
        - Отличия героического режима
        - Отличия эпохального/мифик режима
        - Задачи по ролям (танки, дамагеры, хилы)
        - Видео боя
        - Таблица лута
      outro: >
        Ссылки на тактики других боссов рейда.
  raid_overview:
    description: >
      Первые впечатления от рейда целиком — дизайн, сложность,
      общая оценка. Короткий формат (500-700 слов). Смесь
      дневника и аналитики, не тактика.
    structure:
      intro: >
        Контекст — какой патч, какой рейд, с каким составом зашли.
      body:
        - Визуальный дизайн и атмосфера
        - Общие впечатления от боссов
        - Оценка сложности
        - Статистика прогресса (WoW Progress и т.д.)
      outro: >
        Общий вердикт. Ссылки на тактики.

constraints:
  word_count:
    min: 600
    max: 3300
    target: 1500
    note: >
      boss_tactics обычно 1200–2100, финальные боссы до 3300.
      raid_overview ~600. Финальные боссы (Архимонд, Аргус)
      значительно длиннее из-за многофазности.
  paragraphs:
    max_length: 3-5 предложений
  subheadings: required

structure:
  intro: >
    Краткая история персонажа-босса (лор). Контекст энкаунтера
    в рейде — где находится, что ему предшествует.
  body:
    - Обзор боя (общая механика)
    - Описание способностей босса (с названиями)
    - Тактика для нормального режима
    - Тактика для героического режима (отличия)
    - Тактика для эпохального режима (отличия)
    - Задачи по ролям (танки, дамагеры, хилы)
    - Видео боя
    - Таблица лута
  outro: >
    Ссылки на тактики других боссов рейда.

tone:
  primary: справочно-практический
  allowed:
    - элементы лора в описании босса
    - краткие тактические советы
    - чёткие инструкции
    - игровая терминология (вайп, энкаунтер, адды, фаза)
  avoid:
    - занудный разбор без структуры
    - избыточные личные впечатления (это гайд, не дневник)

formatting:
  bold: имена боссов, названия рейдов, названия фаз
  italic: названия способностей
  lists: для перечисления способностей и тактических шагов
  tables: для лута
  spoilers: раскрывающиеся блоки для списков способностей

