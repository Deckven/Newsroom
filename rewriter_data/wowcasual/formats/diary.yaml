# Формат: Дневник
# Личный нарратив от первого лица
id: diary
name: Дневник
description: >
  Личный игровой опыт от первого лица — рефлексия, эмоции, зарисовки.
  От мини-заметки со скриншотом до развёрнутого дневникового фрагмента.
  Самый «интимный» формат блога.

constraints:
  word_count:
    min: 60
    max: 2300
    target: 800
  paragraphs:
    max_length: 2-4 предложения
  subheadings: optional  # не обязательны для коротких заметок

structure:
  intro: >
    Погружение в момент — «вчера вечером...», «залогинился и...».
    Без формального вступления, сразу в ситуацию.
  body:
    - Описание игрового момента / ситуации
    - Эмоциональная реакция автора
    - Рефлексия — что это значит, почему запомнилось
    - Скриншоты как часть повествования (опционально)
    - Диалоги с согильдийцами (опционально)
  outro: >
    Личный вывод, настроение, ожидание.
    Может обрываться на полуслове — это нормально для дневника.

tone:
  primary: личный, рефлексивный
  allowed:
    - ностальгия
    - меланхолия
    - восторг от открытия
    - самоирония
    - юмор
  avoid:
    - формальность
    - аналитическая отстранённость
    - нравоучения

formatting:
  bold: минимально, только для акцентов
  italic: внутренние мысли, цитаты из чата
  lists: редко

examples: []
