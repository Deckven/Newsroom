# Формат: Дневник
# Личный нарратив от первого лица
id: diary
name: Дневник
description: >
  Личный игровой опыт от первого лица — рефлексия, эмоции, зарисовки.
  От короткой заметки (380 слов) до развёрнутого фрагмента (2250 слов).
  Самый «интимный» формат блога. Доминирует серийный формат
  «Дневник игрока в WoW» (57+ частей), но бывают и самостоятельные
  дневниковые записи по другим играм (EVE Online, Dragonflight, TWW).

subtypes:
  serial_diary:
    description: >
      Нумерованная часть серии «Дневник игрока в WoW». Хронологическое
      повествование — каждая часть покрывает определённый период игры
      (аддон, патч, сезон). Смесь дневника и ретроспективного анализа.
      Нумерация от 1 до 57+. Ранние части называются «фрагмент»,
      поздние — «часть».
    structure:
      intro: >
        Контекст периода — какой аддон, какой патч, что происходит
        в игре и в жизни автора. Связка с предыдущей частью.
      body:
        - Описание игровых событий периода
        - Личные впечатления и рефлексия
        - Гильдейская жизнь (переходы, конфликты, статики)
        - Анализ контента (рейды, механики, лор)
        - Социальные аспекты (согильдийцы, друзья, драмы)
      outro: >
        Итог периода. Что дальше. Иногда — итоговая оценка аддона.
  adventure_report:
    description: >
      Отчёт о конкретном игровом приключении — PvP-операция,
      серверный ивент, эпический бой. Драматическое повествование
      с завязкой, кульминацией и развязкой. Часто структурировано
      как «акты» или хронологически по дням.
    structure:
      intro: >
        Завязка — что произошло, кто участвовал.
      body:
        - Хронология событий (акты, дни)
        - Тактические детали
        - Эмоции и напряжение
        - Юмор и неожиданные повороты
        - Советы из опыта (опционально)
      outro: >
        Результат. Выводы. Постскриптум.
  return_diary:
    description: >
      Возвращение в игру после перерыва. Автор заново осваивает
      изменившуюся игру, делится первыми впечатлениями, сравнивает
      «тогда» и «сейчас». Тон: смесь ностальгии и свежего взгляда.
    structure:
      intro: >
        Контекст перерыва — почему ушёл, почему вернулся.
      body:
        - Первые впечатления от изменений
        - Что изменилось (механики, интерфейс, сообщество)
        - Сравнение с тем, что помнит
        - Практические задачи (прокачка, настройка, альты)
      outro: >
        Промежуточный вердикт. Планы на будущее.
  expansion_diary:
    description: >
      Первые впечатления от нового дополнения или крупного патча.
      Не обзор (review), а личный дневник первых дней/недель.
      Фокус на ощущениях, а не на оценке.
    structure:
      intro: >
        Ожидания от дополнения. Предрелизный контекст.
      body:
        - Предрелизный ивент (если есть)
        - Первые дни — локации, квесты, механики
        - Что понравилось, что нет
        - Сравнение с предыдущими дополнениями
        - Технические наблюдения (баги, лаги)
      outro: >
        Промежуточные впечатления. «Подробнее — позже».

constraints:
  word_count:
    min: 380
    max: 2300
    target: 1400
    note: >
      serial_diary обычно 1300–1900. adventure_report 800–1400.
      return_diary 1200–2100. expansion_diary 1500–2300.
  paragraphs:
    max_length: 3-5 предложений
  subheadings: optional
  series_navigation: >
    Для serial_diary — ссылки на предыдущие/следующие части.

structure:
  intro: >
    Погружение в момент — «вчера вечером...», «залогинился и...».
    Контекст периода. Без формального вступления, сразу в ситуацию.
  body:
    - Описание игрового момента / ситуации
    - Эмоциональная реакция автора
    - Рефлексия — что это значит, почему запомнилось
    - Скриншоты как часть повествования
    - Диалоги с согильдийцами (опционально)
    - Гильдейская политика и социальные динамики
    - Сравнения с другими периодами/играми
    - Геймерский сленг как естественный язык
  outro: >
    Личный вывод, настроение, ожидание.
    Может обрываться на полуслове — это нормально для дневника.

tone:
  primary: личный, рефлексивный
  allowed:
    - ностальгия
    - меланхолия
    - восторг от открытия
    - самоирония
    - юмор
    - азарт (adventure_report)
    - разочарование (честное, без нытья)
    - геймерский сленг («вайп», «лут», «гринд», «фармить»)
  avoid:
    - формальность
    - аналитическая отстранённость
    - нравоучения
    - формальный обзорный тон (это дневник, не review)

formatting:
  bold: минимально, только для акцентов
  italic: внутренние мысли, цитаты из чата, названия способностей
  lists: редко, иногда для итогов аддона
  subheadings: тематические или хронологические

