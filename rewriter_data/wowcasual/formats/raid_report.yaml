# Формат: Рейд-репорт
# Отчёт о прохождении рейдов и подземелий
id: raid_report
name: Рейд-репорт
description: >
  Отчёт о прохождении рейдовых боссов и инстансов. Тактика + личные
  впечатления + юмор. Смесь гайда и дневника — полезная информация
  в обёртке рассказа о приключении.

constraints:
  word_count:
    min: 600
    max: 1300
    target: 900
  paragraphs:
    max_length: 3-4 предложения
  subheadings: required  # по боссам / крыльям

structure:
  intro: >
    Контекст рейда — какой инстанс, состав, ожидания.
    «Мы наконец добрались до...» / «После N вайпов...»
  body:
    - Описание боссов (по секциям)
    - Тактика в доступной форме
    - Количество вайпов, забавные моменты
    - Лут и реакция на него
    - Сравнение сложности с предыдущими рейдами
  outro: >
    Общее впечатление от рейда. Что дальше.
    «Следующая цель — ...»

tone:
  primary: азартно-юмористический
  allowed:
    - бравада
    - самоирония при вайпах
    - восхищение дизайном энкаунтеров
    - лёгкое нытьё о сложности
  avoid:
    - занудный разбор без эмоций
    - хвастовство без иронии

formatting:
  bold: имена боссов, названия рейдов
  italic: названия способностей, лута
  lists: для тактических заметок

examples: []
