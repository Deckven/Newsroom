# Формат: Хронология патчей / История разработки
# Ретроспективный обзор эволюции игры по патчам или этапам разработки
id: patch_timeline
name: Хронология патчей / История разработки
description: >
  Ретроспективный обзор эволюции игры через призму патчей, обновлений
  или этапов разработки. Факты + ностальгия + анализ решений разработчиков.
  Доминирует серийный формат — каждая статья покрывает определённый
  период. Может быть и масштабным обзором всей истории игры целиком.

subtypes:
  patch_chronicle:
    description: >
      Серийная хронология патчей конкретного дополнения или периода.
      Структура по патчам: номер, дата, ключевые изменения, реакция
      сообщества, личные воспоминания. Каждая часть серии покрывает
      2-5 патчей одного аддона.
    structure:
      intro: >
        Контекст дополнения и его место в истории игры.
        Связка с предыдущей частью серии. Общее настроение эпохи.
      body:
        - Секции по патчам (хронологически)
        - Для каждого патча: номер, название, дата выхода
        - Ключевые нововведения (рейды, механики, контент)
        - Реакция сообщества и разработчиков
        - Личные воспоминания автора
        - Геймерский сленг как естественный язык
      outro: >
        Итог периода — что он дал игре. Тизер следующей части
        или итоговая оценка аддона.
  game_history:
    description: >
      Масштабный обзор всей истории игры от разработки до текущего
      состояния. Очень длинный формат (10000-17000 слов). Объединяет
      все патчи и дополнения в единое повествование. По сути —
      «книга» об игре в формате блог-поста.
    structure:
      intro: >
        Контекст создания игры. Разработка и предпосылки.
      body:
        - Этап разработки (годы, команда, решения)
        - Хронология по дополнениям/эпохам
        - Внутри каждого дополнения — по патчам
        - Цитаты из интервью разработчиков
        - Влияние на индустрию
        - Личный опыт автора в каждую эпоху
      outro: >
        Общий итог эволюции игры. Что она значит для индустрии
        и для автора лично.
  dev_history:
    description: >
      История разработки игры — от идеи до запуска (и далее).
      Фокус на людях, решениях и обстоятельствах, а не на контенте.
      Цитаты разработчиков, технические детали, культурный контекст.
    structure:
      intro: >
        Контекст эпохи — что происходило в индустрии.
        Кто стоял за проектом.
      body:
        - Основание студии и философия дизайна
        - Финансирование и бизнес-решения
        - Технические решения и их обоснование
        - Ключевые этапы (прототип, альфа, бета, запуск)
        - Культурный контекст (исландская культура CCP, Blizzard campus и т.д.)
        - Прямые цитаты разработчиков
      outro: >
        Запуск и первые реакции. Тизер следующей части.
  book_translation:
    description: >
      Перевод фрагментов или глав книг о разработке и истории игр.
      Два вида: дневники разработчиков (WoW Diary) и документальные
      книги об игровых сообществах (Empires of EVE). Серийный формат —
      каждая статья переводит одну главу/фрагмент. Автор добавляет
      минимальные комментарии, сохраняя голос оригинала.
    structure:
      intro: >
        Краткий контекст от переводчика — о какой книге речь,
        какая глава, связка с предыдущей частью.
      body:
        - Перевод текста книги с сохранением стиля автора
        - Прямые цитаты участников событий
        - Анекдоты и истории из первых рук
        - Описания людей, решений, обстоятельств
        - Минимальные комментарии переводчика (в скобках или сносках)
      outro: >
        Завершение главы. Ссылки на предыдущие/следующие части.
        «Продолжение следует.»

constraints:
  word_count:
    min: 1800
    max: 5000
    target: 2500
    note: >
      game_history может достигать 15000-17000 слов (история игры целиком).
      patch_chronicle обычно 1900–3500. dev_history обычно 2000–2500.
      book_translation обычно 1200–3200.
  paragraphs:
    max_length: 4-5 предложений
  subheadings: required
  series_navigation: >
    Для patch_chronicle и dev_history — ссылки на другие части серии.

structure:
  intro: >
    Временной период и его место в истории игры.
    Общее настроение эпохи. Связка с предыдущей частью.
    Личный контекст автора — играл ли в этот период.
  body:
    - Секции по патчам или этапам (хронологически)
    - Для каждого патча: дата, ключевые изменения, реакция сообщества
    - Личные воспоминания автора об этом периоде
    - Влияние изменений на мету / сообщество
    - Даты и цифры как каркас повествования
    - Цитаты из интервью разработчиков
    - Геймерский сленг («плюшки», «вайп», «обвес», «фармить»)
  outro: >
    Итог периода — что он дал игре. Тизер следующей части.
    Ностальгическая нота или провокационный вопрос.

tone:
  primary: ностальгически-аналитический
  allowed:
    - «дети Катаклизма» и подобная маркировка эпох
    - тёплая ирония и самоирония
    - сравнение «тогда и сейчас»
    - геймерский сленг как естественный язык
    - критика решений разработчиков
    - восхищение удачными решениями
    - ностальгия без идеализации
  avoid:
    - сухое перечисление без эмоциональной окраски
    - идеализация прошлого без критики
    - формальный тон (это блог, не Википедия)

formatting:
  bold: номера патчей, даты, названия дополнений и рейдов
  italic: цитаты из патч-ноутов, разработчиков
  lists: для перечисления ключевых изменений патча
  subheadings: по патчам или этапам (Патч X.Y.Z «Название»)
  images: скриншоты из игры для визуализации эпохи

