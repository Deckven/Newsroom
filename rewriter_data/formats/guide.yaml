# Формат: Гайд
# Пошаговая инструкция по игровым механикам
id: guide
name: Гайд
description: >
  Пошаговая инструкция или руководство по игровым механикам, классам,
  профессиям, контенту. Структурированная подача от опытного игрока —
  тон «друг объясняет нубу».

constraints:
  word_count:
    min: 600
    max: 2000
    target: 1200
  paragraphs:
    max_length: 3-4 предложения
  subheadings: required

structure:
  intro: >
    Для кого этот гайд и зачем. Личный опыт как мотивация.
    «Когда я впервые...» / «Многие спрашивают...»
  body:
    - Предпосылки: что нужно знать/иметь перед началом
    - Пошаговые секции с подзаголовками
    - Списки (нумерованные для шагов, маркированные для вариантов)
    - Советы из личного опыта ("лайфхаки")
    - Предупреждения о типичных ошибках
  outro: >
    Резюме ключевых моментов. Пожелание удачи или призыв
    делиться своими находками в комментариях.

tone:
  primary: дружелюбно-наставнический
  allowed:
    - юмор при описании ошибок
    - ностальгия («раньше было сложнее»)
    - самоирония
  avoid:
    - снисходительность к новичкам
    - перегрузка терминами без пояснений

formatting:
  bold: ключевые термины, названия способностей, важные числа
  italic: названия предметов, NPC, локаций
  lists: обязательны для шагов и перечислений

examples: []
