# Формат: Новость
# Оперативная подача обновлений, патчей, событий
id: news
name: Новость
description: >
  Оперативная подача игровых новостей — патчи, обновления, анонсы, события.
  Короткий хук, суть, авторская реакция. Минимум лирики, максимум фактов
  с личной окраской.

constraints:
  word_count:
    min: 100
    max: 800
    target: 500
  paragraphs:
    max_length: 3-4 предложения
  subheadings: optional  # для новостей > 400w

structure:
  intro: >
    Зацепляющий хук — что случилось, почему это важно.
    Одно-два предложения, можно с эмоцией или иронией.
  body:
    - Суть новости: факты, даты, цифры
    - Контекст: почему это важно, что было раньше
    - Детали: конкретика из патч-ноутов, интервью, датамайна
  outro: >
    Краткое мнение автора или вопрос к читателям.
    «Оставайтесь на линии» / «Поживем-увидим».

tone:
  primary: информативно-дружелюбный
  allowed:
    - ирония
    - сдержанный энтузиазм
    - скептицизм
  avoid:
    - чрезмерная восторженность без оснований
    - сухой пресс-релизный стиль

formatting:
  bold: названия патчей, дат релизов, ключевых фич
  italic: цитаты из официальных источников
  lists: при перечислении изменений или фич

examples: []  # будут добавлены позже
